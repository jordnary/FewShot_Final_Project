includes:
  - headers/data.yaml
  - headers/device.yaml
  - headers/misc.yaml
  - headers/model.yaml
  - headers/optimizer.yaml
  - classifiers/Proto.yaml
  - backbones/Conv64F.yaml

data_root: D:/Codes/Python/Machine_Learning/FewShot_Final_Project/03_datasets/CUB_200_2011
image_size: 84
use_memory: False
augment: True
augment_times: 1
augment_times_query: 1
workers: 0
dataloader_num: 1

device_ids: 0
n_gpu: 1
seed: 12
deterministic: True

way_num: 5
shot_num: 1
query_num: 15
test_way: 5
test_shot: 1
test_query: 15
episode_size: 1
train_episode: 100
test_episode: 100
epoch: 10
val_per_epoch: 10

backbone:
  name: Conv64F
  kwargs:
    is_flatten: True
    is_feature: False
    leaky_relu: False
    negative_slope: 0.2
    last_pool: True

optimizer:
  name: SGD
  kwargs:
    lr: 0.01
    weight_decay: 0.0005
  other:
    emb_func: 0.01

lr_scheduler:
  name: CosineAnnealingLR
  kwargs:
    T_max: 10
    eta_min: 0

warmup: 0
result_root: D:/Codes/Python/Machine_Learning/FewShot_Final_Project/04_baseline_experiments/results
log_name: proto_cub_5way_1shot
log_interval: 20
save_interval: 10
save_part:
  - emb_func
