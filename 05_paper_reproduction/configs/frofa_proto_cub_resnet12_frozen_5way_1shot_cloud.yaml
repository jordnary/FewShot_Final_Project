includes:
  - headers/data.yaml
  - headers/device.yaml
  - headers/misc.yaml
  - headers/model.yaml
  - headers/optimizer.yaml
  - classifiers/FroFAProto.yaml
  - backbones/resnet12.yaml

data_root: ${PROJECT_ROOT}/03_datasets/CUB_200_2011
image_size: 84
use_memory: False
augment: True
augment_times: 1
augment_times_query: 1
workers: 16
dataloader_num: 1

device_ids: 0
n_gpu: 1
seed: 12
deterministic: False

way_num: 5
shot_num: 1
query_num: 15
test_way: 5
test_shot: 1
test_query: 15
episode_size: 4
train_episode: 2000
test_episode: 1000
epoch: 30
val_per_epoch: 1

pretrain_path: ${PROJECT_ROOT}/04_baseline_experiments/results/proto_cub_resnet12_boost_5way_1shot_cloud/checkpoints/emb_func_best.pth

backbone:
  name: resnet12
  kwargs:
    keep_prob: 0.0
    avg_pool: True
    is_flatten: True
    maxpool_last2: True

classifier:
  name: FroFAProtoNet
  kwargs:
    augmentations:
      - brightness
      - contrast
    alpha: 0.2
    num_aug: 2
    distance: euclidean
    freeze_emb_func: True
    learnable_scale: True

optimizer:
  name: Adam
  kwargs:
    lr: 0.001
    weight_decay: 0.0005
  other:
    emb_func: ~

lr_scheduler:
  name: StepLR
  kwargs:
    step_size: 10
    gamma: 0.5

warmup: 0
result_root: ${PROJECT_ROOT}/05_paper_reproduction/results
log_name: frofa_proto_cub_resnet12_frozen_5way_1shot_cloud
log_interval: 100
save_interval: 10
save_part:
  - emb_func
